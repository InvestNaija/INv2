apiVersion: apps/v1
kind: Deployment
metadata:
  name: depl-po
  namespace: inv2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: po
  template:
    metadata:
      labels:
        app: po
    spec:
      containers:
        - name: po
          image: integrationschd/inv2-po
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
          env:
            - name: NATS_CLIENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BACKEND_BASE
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: BACKEND_BASE
            - name: ACCESS_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: ACCESS_TOKEN_SECRET
            - name: ACCESS_TOKEN_TIME
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: ACCESS_TOKEN_TIME
            - name: AES_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: AES_SECRET_KEY
            - name: RABBITMQ
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: RABBITMQ
            - name: REDIS_SERVER
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: REDIS_SERVER
            - name: NODE_ENV
              valueFrom:
                secretKeyRef:
                  name: common.depl
                  key: NODE_ENV
            - name: PORT
              value: "3000"
            - name: DB_PG_HOST
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_HOST
            - name: DB_PG_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_DB_NAME
            - name: DB_PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_PASSWORD
            - name: DB_PG_USERNAME
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_USERNAME
            - name: DB_PG_PORT
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_PORT
            - name: DB_PG_TIMEZONE
              valueFrom:
                secretKeyRef:
                  name: po.depl
                  key: DB_PG_TIMEZONE
---
apiVersion: v1
kind: Service
metadata:
  name: po-srv
  namespace: inv2
spec:
  selector:
    app: po
  ports:
    - name: po
      protocol: TCP
      port: 3000
      targetPort: 3000
